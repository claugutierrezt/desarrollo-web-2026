<main id="contenido">

<section class="section">
  <div class="stella-container">
    <h1>Contacto</h1>
    <p>Cuéntanos sobre tu sitio y te contactamos con el siguiente paso.</p>
  </div>
</section>

<section class="section">
  <div class="stella-container">
    <h2>Formulario</h2>

    <form method="post" novalidate>

      <div class="form-row">
        <div>
          <label for="nombre">Nombre *</label>
          <input id="nombre" type="text" autocomplete="name" required>
        </div>

        <div>
          <label for="empresa">Empresa</label>
          <input id="empresa" type="text" autocomplete="organization">
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="telefono">Teléfono / WhatsApp *</label>
          <input id="telefono" type="tel" autocomplete="tel" required>
        </div>

        <div>
          <label for="motivo">Motivo *</label>
          <select id="motivo" required>
            <option value="">Selecciona una opción</option>
            <option value="cumplimiento">Cumplimiento / WCAG</option>
            <option value="seo">Mejorar SEO y experiencia</option>
            <option value="inclusion">Compromiso con inclusión</option>
            <option value="otro">Otro</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="tiene-web">¿Tienes web? *</label>
          <select id="tiene-web" required>
            <option value="">Selecciona</option>
            <option value="si">Sí</option>
            <option value="no">No</option>
          </select>
        </div>

        <div>
          <label for="url">URL (si ya tienes)</label>
          <input id="url" type="url" placeholder="https://tu-sitio.com">
        </div>
      </div>

      <div>
        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" rows="6"></textarea>
      </div>

      <button type="submit">Enviar</button>
    </form>
  </div>
</section>

</main>

<footer>
  <div class="stella-container">
